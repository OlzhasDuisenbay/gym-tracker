<div class="form-page">
  <div class="form-card">
    <h2>Welcome back</h2>
    <p class="form-subtitle">Sign in to your GymTracker account</p>

    <div *ngIf="errorMsg" class="error-msg">{{ errorMsg }}</div>

    <div class="form-group">
      <label>Username</label>
      <input [(ngModel)]="username" name="username" placeholder="Enter username" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input [(ngModel)]="password" name="password" type="password" placeholder="Enter password" />
    </div>

    <button class="btn-primary" (click)="onLogin()">Sign in</button>

    <div class="form-link">
      Don't have an account? <a routerLink="/register">Register</a>
    </div>
  </div>
</div>
