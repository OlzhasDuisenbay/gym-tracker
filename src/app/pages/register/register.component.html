<div class="form-page">
  <div class="form-card">
    <h2>Create account</h2>
    <p class="form-subtitle">Start tracking your workouts today</p>

    <div *ngIf="errorMsg" class="error-msg">{{ errorMsg }}</div>
    <div *ngIf="successMsg" class="success-msg">{{ successMsg }}</div>

    <div class="form-group">
      <label>Username</label>
      <input [(ngModel)]="username" name="username" placeholder="Choose a username" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input [(ngModel)]="password" name="password" type="password" placeholder="Choose a password" />
    </div>

    <button class="btn-primary" (click)="onRegister()">Create account</button>

    <div class="form-link">
      Already have an account? <a routerLink="/login">Sign in</a>
    </div>
  </div>
</div>
